name: "Publish Python Package After README or Tag"

on:
  workflow_run:
    workflows: ["Update README After CodeQL"]
    types:
      - completed
  push:
    tags:
      - '*'  # أي Tag جديد

jobs:
  release-build:
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build release distributions
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: release-dists
          path: dist/

  pypi-publish:
    runs-on: ubuntu-latest
    needs: release-build
    steps:
      - name: Retrieve release distributions
        uses: actions/download-artifact@v4
        with:
          name: release-dists
          path: dist/

      - name: Publish release distributions to PyPI
        uses: pypa/gh-action-pypi-publish@v1.5.0
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
          packages-dir: dist/

      - name: Report failure as Issue
        if: failure()
        run: |
          BODY="⚠️ PyPI publish failed for workflow triggered by event: $GITHUB_EVENT_NAME"
          gh issue create --title "PyPI Publish Failure" --body "$BODY" --labels "bug,failure"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
