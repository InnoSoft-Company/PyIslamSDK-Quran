name: "Update README After CodeQL"

on:
  workflow_run:
    workflows: ["CodeQL Ultra Super + Auto Issue"]
    types:
      - completed

jobs:
  update-readme:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4
      - name: Update README
        run: |
          # هنا تحط أي سكريبت لتعديل README
          echo "Updated at $(date)" >> README.md
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add README.md
          git commit -m "Auto-update README after successful CodeQL"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Report failure as Issue
        if: failure()
        run: |
          BODY="⚠️ README update failed after CodeQL success."
          gh issue create --title "README Update Failure" --body "$BODY" --labels "bug,failure"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
